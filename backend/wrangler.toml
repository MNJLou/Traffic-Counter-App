name = "traffic-counter-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "YOUR_ACCOUNT_ID"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "traffic-counter-db"
database_id = "YOUR_DB_ID"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.production.d1_databases]
binding = "DB"
database_name = "traffic-counter-db"
database_id = "YOUR_DB_ID"

[[triggers.crons]]
cron = "*/15 * * * *"
