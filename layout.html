<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Retail Traffic Monitor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-container": "#ffceca",
                        "on-primary-fixed-variant": "#00468c",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "on-error": "#ffffff",
                        "surface-tint": "#005db6",
                        "tertiary-fixed": "#ffdad6",
                        "outline-variant": "#c2c6d4",
                        "inverse-primary": "#a9c7ff",
                        "primary-fixed-dim": "#a9c7ff",
                        "outline": "#727783",
                        "on-primary-fixed": "#001b3d",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "primary": "#00478d",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "surface": "#f8f9fc",
                        "secondary-container": "#8ef69b",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#2e3133",
                        "background": "#f8f9fc",
                        "on-tertiary-fixed": "#410003",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#bb1b21",
                        "on-secondary-fixed-variant": "#00531f",
                        "on-primary-container": "#c8daff",
                        "surface-variant": "#e1e2e5",
                        "surface-container-high": "#e7e8eb",
                        "on-tertiary-fixed-variant": "#930010",
                        "primary-container": "#005eb8",
                        "secondary-fixed-dim": "#75dc84",
                        "surface-bright": "#f8f9fc",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#91f99e",
                        "on-secondary-fixed": "#002108",
                        "primary-fixed": "#d6e3ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#00722d",
                        "surface-dim": "#d8dadd",
                        "on-background": "#191c1e",
                        "on-surface-variant": "#424752",
                        "surface-container-highest": "#e1e2e5",
                        "tertiary": "#940010",
                        "secondary": "#006e2b",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fc;
        }
        .editorial-headline {
            font-family: 'Public Sans', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-background text-on-surface flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="docked w-full top-0 z-50 bg-[#f2f4f6] dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00478d] dark:text-blue-500" data-icon="storefront">storefront</span>
<h1 class="text-xl font-bold tracking-tighter text-[#00478d] dark:text-blue-500 editorial-headline">Retail Traffic</h1>
</div>
<div class="relative group">
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-highest rounded-xl hover:bg-[#e1e2e5] transition-colors font-['Public_Sans'] font-semibold tracking-tight text-[#191c1e]">
<span>Walmart</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
<div class="absolute right-0 top-full mt-2 w-48 bg-surface-container-lowest shadow-xl rounded-xl hidden group-hover:block overflow-hidden z-50">
<div class="px-4 py-3 hover:bg-surface-container-low cursor-pointer font-medium">Checkers</div>
<div class="px-4 py-3 hover:bg-surface-container-low cursor-pointer font-medium border-t border-outline-variant/10">PnP</div>
<div class="px-4 py-3 hover:bg-surface-container-low cursor-pointer font-medium border-t border-outline-variant/10 text-primary font-bold">Walmart</div>
</div>
</div>
</header>
<main class="flex-1 px-4 pt-6 pb-32 max-w-2xl mx-auto w-full space-y-4 overflow-y-auto no-scrollbar">
<!-- Current Session Bento Card -->
<section class="bg-surface-container-low rounded-3xl p-6 flex flex-col items-center justify-center text-center">
<p class="text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1">Active Session</p>
<h2 class="text-2xl font-bold text-on-surface editorial-headline mb-4">Wednesday: 12pm - 2pm</h2>
<div class="bg-surface-container-lowest p-4 rounded-2xl flex flex-col items-center justify-center min-w-[160px] shadow-sm border border-outline-variant/20">
<span class="text-[0.65rem] font-black uppercase tracking-[0.2em] text-tertiary mb-1 font-label">Sync Countdown</span>
<div class="text-4xl font-bold tracking-tighter text-on-surface editorial-headline tabular-nums">14:59</div>
<div class="w-full bg-surface-container mt-3 h-1.5 rounded-full overflow-hidden">
<div class="bg-tertiary h-full w-3/4"></div>
</div>
</div>
</section>
<!-- Counting Dashboard -->
<div class="flex flex-col gap-4">
<!-- People Entering -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col gap-4">
<div class="flex justify-between items-center px-2">
<span class="editorial-headline font-bold text-lg text-on-surface">People Entering</span>
<span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label text-xs font-bold">LIVE</span>
</div>
<div class="grid grid-cols-3 items-center gap-4">
<button class="bg-surface-container-highest text-on-surface-variant h-16 rounded-xl flex items-center justify-center active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl">remove</span>
</button>
<div class="text-center">
<span class="editorial-headline text-5xl font-bold text-secondary tabular-nums">142</span>
</div>
<button class="bg-secondary text-on-secondary h-16 rounded-xl flex items-center justify-center active:scale-95 transition-all shadow-lg shadow-secondary/20">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
<!-- People Leaving -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col gap-4">
<div class="flex justify-between items-center px-2">
<span class="editorial-headline font-bold text-lg text-on-surface">People Leaving</span>
</div>
<div class="grid grid-cols-3 items-center gap-4">
<button class="bg-surface-container-highest text-on-surface-variant h-16 rounded-xl flex items-center justify-center active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl">remove</span>
</button>
<div class="text-center">
<span class="editorial-headline text-5xl font-bold text-primary tabular-nums">89</span>
</div>
<button class="bg-primary text-on-primary h-16 rounded-xl flex items-center justify-center active:scale-95 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
<!-- Leaving with Bags -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col gap-4">
<div class="flex justify-between items-center px-2">
<div class="flex flex-col">
<span class="editorial-headline font-bold text-lg text-on-surface">Leaving with Bags</span>
<span class="font-label text-xs text-on-surface-variant">Conversion metric</span>
</div>
</div>
<div class="grid grid-cols-3 items-center gap-4">
<button class="bg-surface-container-highest text-on-surface-variant h-16 rounded-xl flex items-center justify-center active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl">remove</span>
</button>
<div class="text-center">
<span class="editorial-headline text-5xl font-bold text-primary tabular-nums">64</span>
</div>
<button class="bg-primary text-on-primary h-16 rounded-xl flex items-center justify-center active:scale-95 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
</div>
<!-- Submit Session Button -->
<div class="pt-4">
<button class="w-full h-16 bg-primary text-white rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-xl shadow-primary/10 hover:brightness-110 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">send</span>
                Submit Session
            </button>
<p class="text-center mt-4 text-xs font-medium text-on-surface-variant/60 font-label">
                Last auto-sync: 12:15 PM
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#f2f4f6]/80 dark:bg-slate-900/80 backdrop-blur-md z-50 rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
<a class="flex flex-col items-center justify-center bg-[#00478d] text-white rounded-xl px-8 py-2 transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Count</span>
</a>
<a class="flex flex-col items-center justify-center text-[#424752] dark:text-slate-400 px-8 py-2 transition-all hover:bg-[#e7e8eb] dark:hover:bg-slate-800 rounded-xl active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">History</span>
</a>
</nav>
</body></html>
